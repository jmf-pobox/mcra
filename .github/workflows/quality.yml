name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --extra dev --locked
      - run: uv run black --check mcra/ tests/
      - run: uv run ruff check mcra/ tests/
      - run: uv run mypy --strict mcra/

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --extra dev --locked
      - run: uv run pytest tests/ -q
